version: '3.8'

services:
  # 1. The Updater: Purely downloads the vulnerability database 
  # It runs immediately on startup, then sleeps for 24 hours and repeats.
  trivy-db-updater:
    image: aquasec/trivy:latest
    container_name: trivy_db_updater
    entrypoint: /bin/sh
    command: -c "while true; do trivy image --download-db-only --no-progress && trivy image --download-java-db-only --no-progress; sleep 86400; done"
    volumes:
      - trivy_cache:/root/.cache/trivy

  # 2. The Scanner: Purely answers scan requests.
  # We use --skip-db-update so it never talks to the internet itself.
  trivy-server:
    image: aquasec/trivy:latest
    container_name: trivy_server
    entrypoint: /bin/sh
    command: -c "while [ ! -f /root/.cache/trivy/db/trivy.db ]; do echo 'Waiting for Trivy DB to be downloaded...'; sleep 5; done; trivy server --listen 0.0.0.0:4954 --skip-db-update"
    ports:
      - "4954:4954"
    volumes:
      - trivy_cache:/root/.cache/trivy
    depends_on:
      - trivy-db-updater
    restart: unless-stopped

  # 3. Web Dashboard: Serves the HTML reports to the team
  web-dashboard:
    image: nginx:alpine
    container_name: security_dashboard
    ports:
      - "8080:80"
    volumes:
      - ./reports:/usr/share/nginx/html
    restart: unless-stopped

volumes:
  # This shared volume allows the updater to pass the DB to the server
  trivy_cache:
